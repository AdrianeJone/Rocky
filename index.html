<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adopt Rocky!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden; position: relative;
  }
  .stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: #f0d060;
    text-shadow: 0 0 10px #f0a020, 3px 3px 0 #7a5000;
    margin-bottom: 20px; letter-spacing: 2px;
    position: relative; z-index: 1;
    animation: titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 10px #f0a020, 3px 3px 0 #7a5000; }
    50% { text-shadow: 0 0 24px #ffcc00, 3px 3px 0 #7a5000, 0 0 40px #f0a02088; }
  }
  .scene {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    gap: 24px; flex-wrap: wrap; justify-content: center;
  }
  #rockyCanvas {
    image-rendering: pixelated; image-rendering: crisp-edges;
    cursor: pointer;
    filter: drop-shadow(0 0 16px #6b4a2a88);
    transition: filter 0.2s;
  }
  #rockyCanvas:hover { filter: drop-shadow(0 0 28px #d4884488); }
  .bubble-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .bubble {
    background: #f5f0e0; border: 4px solid #2a1a08;
    padding: 14px 18px; position: relative;
    box-shadow: 5px 5px 0 #2a1a08; min-width: 180px; max-width: 240px;
  }
  .bubble::before {
    content: ''; position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
    border-top: 12px solid transparent; border-bottom: 12px solid transparent;
    border-right: 20px solid #2a1a08;
  }
  .bubble::after {
    content: ''; position: absolute; left: -13px; top: 50%; transform: translateY(-50%);
    border-top: 9px solid transparent; border-bottom: 9px solid transparent;
    border-right: 14px solid #f5f0e0;
  }
  .bubble-text {
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    color: #2a1a08; line-height: 1.8; min-height: 24px;
  }
  .name-row { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .name-row input {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 8px 10px; border: 3px solid #2a1a08;
    background: #1a0a00; color: #f0d060; outline: none;
    width: 100%; box-shadow: 3px 3px 0 #2a1a08;
  }
  .name-row input::placeholder { color: #5a4030; }
  .name-row button {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    padding: 8px 12px; border: 3px solid #2a1a08;
    background: #d4882a; color: #fff8e0;
    cursor: pointer; box-shadow: 3px 3px 0 #2a1a08; transition: all 0.1s;
  }
  .name-row button:hover { background: #f0a040; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #2a1a08; }
  .name-row button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #2a1a08; }
  .lore {
    font-family: 'VT323', monospace; font-size: 18px;
    color: #7a8aaa; margin-top: 18px; text-align: center;
    max-width: 420px; line-height: 1.5; position: relative; z-index: 1;
  }
  .lore span { color: #c4a870; }
  .heart-pop {
    position: fixed; pointer-events: none; font-size: 28px;
    animation: heartFloat 1.2s ease-out forwards; z-index: 100;
  }
  @keyframes heartFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }
</style>
</head>
<body>
<canvas class="stars-canvas" id="starsCanvas" width="648" height="559"></canvas>
<h1>⭐ Will you adopt me, question? ⭐</h1>
<div class="scene">
  <canvas id="rockyCanvas" width="220" height="220"></canvas>
  <div class="bubble-wrap">
    <div class="bubble"><div class="bubble-text" id="bubbleText">Ees...?</div></div>
    <div class="name-row" id="nameForm">
      <input type="text" id="nameInput" maxlength="12" placeholder="Your name...">
      <button onclick="adoptRocky()">ADOPT! 🪨</button>
    </div>
  </div>
</div>
<div class="lore">
  Species: <span>Eridian</span> | Origin: <span>40 Eridani</span><br>
  Loves: <span>ammonia, jazz, and science</span>
  Friends: <span>Shyshy, Noise Noise</span>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────────────────
const starCanvas = document.getElementById('starsCanvas');
const sCtx = starCanvas.getContext('2d');
let starW, starH, starList = [];
function initStars() {
  starW = starCanvas.width = window.innerWidth;
  starH = starCanvas.height = window.innerHeight;
  starList = Array.from({length:140}, () => ({
    x: Math.random()*starW, y: Math.random()*starH,
    r: Math.random()*1.5+0.3, speed: Math.random()*0.006+0.002
  }));
}
function drawStars(t) {
  sCtx.clearRect(0,0,starW,starH);
  for (const s of starList) {
    const a = 0.3 + 0.7*(0.5+0.5*Math.sin(t*s.speed*60));
    sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sCtx.fillStyle = 'rgba(220,230,255,'+a+')'; sCtx.fill();
  }
}
window.addEventListener('resize', initStars);
initStars();

// ── Rocky Pixel Art ────────────────────────────────────────────────────
// Rocky from Project Hail Mary: spider-like Eridian, round rocky body,
// 5 legs, three compound amber eyes, no mouth, lichen patches

const rockyCanvas = document.getElementById('rockyCanvas');
const rCtx = rockyCanvas.getContext('2d');
rCtx.imageSmoothingEnabled = false;

const PX = 9; // each logical pixel = 9 canvas pixels

// Color map
const COLORS = {
  B: '#9b7e52',  // body brown
  D: '#2e1a08',  // dark outline
  L: '#c8aa74',  // light body
  H: '#e0c080',  // highlight
  E: '#f0c830',  // eye amber
  K: '#150600',  // eye pupil
  G: '#6a7a48',  // lichen green
  S: '#7a6040',  // shadow
  M: '#b89050',  // mid
  W: '#fff8b0',  // eye shine
};

// Each entry: [col, row, colorKey]
// Rocky sprite centered around col 10-11, body rows 4-15, legs extend out
function makeSprite() {
  const pts = [];
  function p(x, y, c) { pts.push([x, y, c]); }

  // ── TOP LEG (upper-left) ──
  p(4,0,'D'); p(5,0,'B');
  p(5,1,'D'); p(6,1,'B'); p(6,2,'S');
  p(7,2,'D'); p(7,3,'B');

  // ── LEFT LEG ──
  p(0,9,'D');  p(1,9,'B');
  p(2,9,'D');  p(2,10,'B'); p(1,10,'S');
  p(3,10,'D'); p(3,11,'B');

  // ── BOTTOM-LEFT LEG ──
  p(4,18,'D'); p(5,18,'B');
  p(5,17,'D'); p(6,17,'B'); p(6,16,'S');
  p(7,16,'D'); p(7,15,'B');

  // ── BOTTOM-RIGHT LEG ──
  p(15,15,'B'); p(16,16,'D'); p(16,16,'S');
  p(16,17,'D'); p(17,17,'B');
  p(17,18,'D'); p(18,18,'B');
  p(18,19,'D'); p(19,19,'B');

  // ── RIGHT LEG ──
  p(19,10,'D'); p(20,10,'B');
  p(20,9,'D');  p(21,9,'B');
  p(21,8,'D');  p(22,8,'B'); p(22,7,'S');

  // ── BODY OUTLINE + FILL ──
  // Row 3 (top cap)
  p(8,3,'D'); p(9,3,'D'); p(10,3,'D'); p(11,3,'D'); p(12,3,'D'); p(13,3,'D');

  // Row 4
  p(7,4,'D'); p(8,4,'L'); p(9,4,'H'); p(10,4,'H'); p(11,4,'H'); p(12,4,'L'); p(13,4,'B'); p(14,4,'D');

  // Row 5 - top eye row
  p(6,5,'D'); p(7,5,'B'); p(8,5,'L');
  p(9,5,'E');  p(10,5,'K'); p(11,5,'E');   // left eye
  p(12,5,'H');
  p(13,5,'E'); p(14,5,'K');                 // right eye
  p(15,5,'B'); p(16,5,'D');

  // Row 6 - eye shine
  p(6,6,'D'); p(7,6,'B'); p(8,6,'M');
  p(9,6,'W');  p(10,6,'E'); p(11,6,'E');
  p(12,6,'M');
  p(13,6,'W'); p(14,6,'E');
  p(15,6,'M'); p(16,6,'D');

  // Row 7 - center eye
  p(6,7,'D'); p(7,7,'B'); p(8,7,'B'); p(9,7,'L');
  p(10,7,'E'); p(11,7,'K'); p(12,7,'E');   // center eye
  p(13,7,'L'); p(14,7,'B'); p(15,7,'B'); p(16,7,'D');

  // Row 8 - center eye shine
  p(6,8,'D'); p(7,8,'B'); p(8,8,'M'); p(9,8,'B');
  p(10,8,'W'); p(11,8,'E');
  p(12,8,'B'); p(13,8,'M'); p(14,8,'B'); p(15,8,'B'); p(16,8,'D');

  // Row 9
  p(6,9,'D'); p(7,9,'B'); p(8,9,'B'); p(9,9,'L'); p(10,9,'M'); p(11,9,'B'); p(12,9,'M'); p(13,9,'L'); p(14,9,'B'); p(15,9,'B'); p(16,9,'D');

  // Row 10 - lichen
  p(7,10,'D'); p(8,10,'B'); p(9,10,'G'); p(10,10,'G'); p(11,10,'B'); p(12,10,'G'); p(13,10,'G'); p(14,10,'B'); p(15,10,'D');

  // Row 11
  p(7,11,'D'); p(8,11,'B'); p(9,11,'L'); p(10,11,'B'); p(11,11,'S'); p(12,11,'B'); p(13,11,'L'); p(14,11,'B'); p(15,11,'D');

  // Row 12
  p(7,12,'D'); p(8,12,'B'); p(9,12,'M'); p(10,12,'B'); p(11,12,'B'); p(12,12,'B'); p(13,12,'M'); p(14,12,'B'); p(15,12,'D');

  // Row 13
  p(8,13,'D'); p(9,13,'B'); p(10,13,'L'); p(11,13,'S'); p(12,13,'L'); p(13,13,'B'); p(14,13,'D');

  // Row 14
  p(8,14,'D'); p(9,14,'B'); p(10,14,'B'); p(11,14,'B'); p(12,14,'B'); p(13,14,'B'); p(14,14,'D');

  // Row 15 (bottom cap)
  p(9,15,'D'); p(10,15,'B'); p(11,15,'S'); p(12,15,'B'); p(13,15,'D');

  return pts;
}

const SPRITE_PTS = makeSprite();

// Animation state
let isBlinking = false;
let adopted = false;
let happyTimer = 0;

function warmShift(hex, timer) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const glow = Math.min(1,timer/100)*0.3*(0.5+0.5*Math.sin(Date.now()*0.006));
  return 'rgb('+(Math.min(255,r+glow*90)|0)+','+(Math.min(255,g+glow*40)|0)+','+(Math.min(255,b+glow*10)|0)+')';
}

function drawRocky(t) {
  rCtx.clearRect(0, 0, rockyCanvas.width, rockyCanvas.height);

  const bob = Math.sin(t * 0.002) * 3;

  // Find sprite bounding box to center it
  // Sprite spans roughly x:0-22, y:0-19
  const spritePixelW = 23;
  const spritePixelH = 20;
  const ox = Math.floor((rockyCanvas.width - spritePixelW * PX) / 2);
  const oy = Math.floor((rockyCanvas.height - spritePixelH * PX) / 2) + bob;

  for (const [gx, gy, ck] of SPRITE_PTS) {
    if (isBlinking && (ck === 'E' || ck === 'W' || ck === 'K')) continue;

    let dx = ox + gx * PX;
    let dy = oy + gy * PX;

    // Leg wiggle
    if (gy <= 2 || gy >= 16) {
      dx += Math.sin(t * 0.0025 + gx * 1.1) * 1.5;
      dy += Math.cos(t * 0.002 + gy * 0.9) * 0.8;
    }

    let color = COLORS[ck];
    if (adopted && happyTimer > 0 && ck !== 'K' && ck !== 'D') {
      color = warmShift(color, happyTimer);
    }

    rCtx.fillStyle = color;
    rCtx.fillRect(dx, dy, PX, PX);
  }
}

// ── Blink ──────────────────────────────────────────────────────────────
function scheduleBlink() {
  setTimeout(function() {
    isBlinking = true;
    setTimeout(function() { isBlinking = false; scheduleBlink(); }, 130);
  }, 2500 + Math.random() * 4000);
}
scheduleBlink();

// ── Bubble text ────────────────────────────────────────────────────────
const bubbleEl = document.getElementById('bubbleText');
let typeInterval = null;
function setLine(line) {
  if (typeInterval) clearInterval(typeInterval);
  bubbleEl.textContent = '';
  let i = 0;
  typeInterval = setInterval(function() {
    if (i < line.length) { bubbleEl.textContent += line[i++]; }
    else clearInterval(typeInterval);
  }, 55);
}

// ── Idle cycle ─────────────────────────────────────────────────────────
const idleLines = ["Please name","I am alone...","Eridian cold","No human?","*clicks sadly*","Ees...?"];
let lineIdx = 0;
function cycleIdle() {
  if (!adopted) { lineIdx=(lineIdx+1)%idleLines.length; setLine(idleLines[lineIdx]); }
  setTimeout(cycleIdle, 3000 + Math.random()*2000);
}
setTimeout(cycleIdle, 3000);

// ── Adopt ──────────────────────────────────────────────────────────────
const happyLines = ["EES EES!","I like you!","Amaze Grace!","Science is!","You my human!","EEEES!"];
function adoptRocky() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { setLine("Give me name!"); shakeCanvas(); return; }
  adopted = true; happyTimer = 400;
  document.getElementById('nameForm').style.display = 'none';
  setLine(name + "!!");
  setTimeout(function() { setLine("Thank you, " + name + "!"); }, 2000);
  setTimeout(function() { setLine("I am Rocky, " + name + ". Statement."); }, 4500);
  setTimeout(cycleHappy, 9000);
  for (let i=0; i<7; i++) setTimeout(spawnHeart, i*220);
}
function cycleHappy() {
  if (!adopted) return;
  setLine(happyLines[Math.floor(Math.random()*happyLines.length)]);
  setTimeout(cycleHappy, 2500+Math.random()*2000);
}

function shakeCanvas() {
  let t=0;
  const id = setInterval(function() {
    rockyCanvas.style.transform = 'translateX('+Math.sin(t*2)*5+'px)'; t++;
    if (t>10) { clearInterval(id); rockyCanvas.style.transform=''; }
  }, 30);
}

function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart-pop';
  h.textContent = ['💛','⭐','🪨','❤️'][Math.floor(Math.random()*4)];
  h.style.left = (25+Math.random()*50)+'vw';
  h.style.top  = (30+Math.random()*30)+'vh';
  document.body.appendChild(h);
  setTimeout(function() { h.remove(); }, 1300);
}

rockyCanvas.addEventListener('click', function() {
  const pokes = adopted
    ? ["EES EES!","Yes yes!","Science!!!","I like!","Amaze!"]
    : ["*click click*","Name me!","Eees?","Hello human!","I feel!"];
  setLine(pokes[Math.floor(Math.random()*pokes.length)]);
  spawnHeart();
});

// ── Main loop ──────────────────────────────────────────────────────────
function loop(t) {
  drawStars(t);
  drawRocky(t);
  if (happyTimer > 0) happyTimer--;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>


</body></html>
